  # ⚙️ MAXXPHARM Worker Service - Фоновые задачи
  - type: worker
    name: maxxpharm-worker
    env: python
    plan: free
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    startCommand: "python worker_service.py"
    healthCheck:
      enabled: true
      path: /health
      gracePeriodSeconds: 30
      intervalSeconds: 60
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.14"
      # 🔄 Redis Configuration
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      # 📊 Logging
      - key: LOG_LEVEL
        value: "INFO"
      - key: ENVIRONMENT
        value: "production"
      - key: DEBUG
        value: "False"
      # ⚙️ Worker Configuration
      - key: WORKER_CONCURRENCY
        value: "4"
      - key: WORKER_QUEUES
        value: "ai_queue,notification_queue,order_queue,analytics_queue,maintenance_queue"
      - key: CELERY_TIME_LIMIT
        value: "300"
      - key: CELERY_SOFT_TIME_LIMIT
        value: "240"
    rootDir: /
