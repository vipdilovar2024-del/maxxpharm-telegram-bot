services:
  - type: web
    name: maxxpharm-telegram-bot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python simple_bot.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_URL
        value: "sqlite:///./bot.db"
    healthCheck:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    rootDir: /
