        value: "True"
    rootDir: /

  # ⚙️ Order Workers Service - Обработка заказов
  - type: worker
    name: maxxpharm-order-workers
    env: python
    plan: free
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    startCommand: "python worker_services.py"
    healthCheck:
      enabled: true
      path: /health
      gracePeriodSeconds: 30
      intervalSeconds: 60
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.14"
      # 🔄 Redis Configuration
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      # 📊 Logging
      - key: LOG_LEVEL
        value: "INFO"
      - key: ENVIRONMENT
        value: "production"
      - key: DEBUG
        value: "False"
      # ⚙️ Worker Configuration
      - key: WORKER_TYPE
        value: "order"
      - key: WORKER_CONCURRENCY
        value: "4"
      - key: ORDER_QUEUE_SIZE
        value: "10000"
      - key: PROCESSING_BATCH_SIZE
        value: "10"
    rootDir: /

  # ⚙️ All Workers Service - Все типы workers
  - type: worker
    name: maxxpharm-all-workers
    env: python
    plan: free
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    startCommand: "python worker_services.py"
    healthCheck:
      enabled: true
      path: /health
      gracePeriodSeconds: 30
      intervalSeconds: 60
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.14"
      # 🔄 Redis Configuration
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      # 📊 Logging
      - key: LOG_LEVEL
        value: "INFO"
      - key: ENVIRONMENT
        value: "production"
      - key: DEBUG
        value: "False"
      # ⚙️ Worker Configuration
      - key: WORKER_TYPE
        value: "all"
      - key: TOTAL_WORKERS
        value: "12"
      - key: ORDER_WORKERS
        value: "4"
      - key: PAYMENT_WORKERS
        value: "2"
      - key: NOTIFICATION_WORKERS
        value: "3"
      - key: ANALYTICS_WORKERS
        value: "1"
      - key: DELIVERY_WORKERS
        value: "2"
    rootDir: /
