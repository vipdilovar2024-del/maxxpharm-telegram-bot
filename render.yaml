      # 🔄 Redis Configuration
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      # 📊 Logging
      - key: LOG_LEVEL
        value: "INFO"
      - key: ENVIRONMENT
        value: "production"
      - key: DEBUG
        value: "False"
      # 🛡️ Production System Configuration
      - key: PRODUCTION_MODE
        value: "True"
      - key: WATCHDOG_ENABLED
        value: "True"
      - key: HEALTH_CHECK_ENABLED
