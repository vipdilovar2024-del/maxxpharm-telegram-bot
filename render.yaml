services:
  # 🚀 MAXXPHARM Production Bot - Объединенный бот со всеми возможностями
  - type: web
    name: maxxpharm-telegram-bot
    env: python
    plan: free
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    startCommand: "python maxxpharm_starter.py"
    healthCheckPath: "/health"
    healthCheck:
      enabled: true
      gracePeriodSeconds: 30
      intervalSeconds: 60
      timeoutSeconds: 10
      failureThreshold: 3
      successThreshold: 2
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.14"
      # 🤖 Bot Configuration
      - key: BOT_TOKEN
        value: "7759398408:AAE8sTBDYO9cf9tjbCu6ZcrvPQxy9j28KGI"
      - key: ADMIN_ID
        value: "697780123"
      - key: RENDER
        value: "True"
      # 🗄️ Database Configuration
      - key: DATABASE_URL
        value: "postgresql+asyncpg://solimfarm_db_steg_user:B4a9T78li3OZlOfVu3f6bF9iBfLWJfu9@dpg-d6ane6cr85hc73ep4qd0-a.oregon-postgres.render.com/solimfarm_db_steg"
      - key: DB_HOST
        value: "dpg-d6ane6cr85hc73ep4qd0-a.oregon-postgres.render.com"
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        value: "solimfarm_db_steg_user"
      - key: DB_PASSWORD
        value: "B4a9T78li3OZlOfVu3f6bF9iBfLWJfu9"
      - key: DB_NAME
        value: "solimfarm_db_steg"
      # 🧠 AI Configuration
      - key: OPENAI_API_KEY
